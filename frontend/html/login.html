<!DOCTYPE html>
<html lang="en" class="bg-zinc-950 text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Try Me Tumble</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col p-8 items-center justify-center relative">
    <div class="absolute top-8 left-8">
        <a href="discover.html" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
            </svg>
            Back to Home
        </a>
    </div>

    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-3xl p-8 shadow-2xl">
        <h1 class="text-3xl font-bold font-mono text-center mb-6">
            Log In
        </h1>

        <div id="errorMsg" class="hidden bg-red-900/50 border border-red-800 text-red-200 px-4 py-3 rounded-lg mb-6 text-sm text-center"></div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-zinc-400 mb-1">Username</label>
                <input type="text" id="username" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white focus:outline-none focus:border-pink-600 transition" placeholder="e.g. explorer99">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-zinc-400 mb-1">Password</label>
                <input type="password" id="password" required class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-white focus:outline-none focus:border-pink-600 transition" placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded-xl transition-all hover:scale-[1.02] active:scale-[0.98] mt-4 shadow-lg shadow-pink-600/20">
                Sign In
            </button>
        </form>

        <p class="text-zinc-500 text-sm text-center mt-6">
            Don't have an account? <a href="signup.html" class="text-pink-500 hover:text-pink-400 underline decoration-pink-500/30 underline-offset-4">Sign up</a>
        </p>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
