name: .NET CI

on:
  push:
    branches: [ "main", "staging", "develop" ]
  pull_request:
    branches: [ "main", "staging", "develop" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dotnet-build:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      database:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_PASSWORD: "testpassword123"
          POSTGRES_USER: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Using the targeted Net 10.0 version from the project

    - name: Restore dependencies
      run: dotnet restore TryMeTumble.slnx

    - name: Build
      run: dotnet build TryMeTumble.slnx --no-restore -c Release

    - name: Test
      run: dotnet test TryMeTumble.slnx --no-build --verbosity normal -c Release
      env:
        ConnectionStrings__DefaultConnection: "Host=127.0.0.1;Database=app_test;Username=app;Password=testpassword123"
        RedisCacheSettings__ConnectionString: "127.0.0.1:6379"

  deploy_staging:
    name: Deploy to Staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: dotnet-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          chmod +x scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_WEBHOOK_URL_STAGING: ${{ secrets.DEPLOY_WEBHOOK_URL_STAGING }}

  deploy_production:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: dotnet-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          chmod +x scripts/deploy-production.sh
          ./scripts/deploy-production.sh
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}