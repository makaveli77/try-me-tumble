<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover - TryMeTumble</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @layer base {
            body { @apply bg-zinc-950 text-zinc-100 font-sans; }
        }
        .shining-border {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        .shining-border::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(236, 72, 153, 0.3), transparent);
            z-index: -1;
            animation: shine 3s linear infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%); }
            100% { transform: translateX(100%) translateY(100%); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-pink-600 rounded-lg flex items-center justify-center transform rotate-12">
                    <span class="text-white font-bold text-xl -rotate-12">T</span>
                </div>
                <span class="text-xl font-bold tracking-tight">TryMeTumble</span>
            </div>
            <div class="hidden md:flex items-center gap-8">
                <a href="#" class="text-zinc-400 hover:text-white transition-colors">Discover</a>
                <a href="#" class="text-zinc-400 hover:text-white transition-colors">Trending</a>
                <a href="#" class="text-zinc-400 hover:text-white transition-colors">Categories</a>
            </div>
            <div class="flex items-center gap-4">
                <button class="px-4 py-2 border border-zinc-700 rounded-full hover:bg-zinc-800 transition-colors text-sm font-medium">Log In</button>
                <button class="px-4 py-2 bg-pink-600 hover:bg-pink-700 rounded-full transition-colors text-sm font-medium">Sign Up</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 py-12">
        <div class="w-full max-w-4xl space-y-8 text-center">
            <div class="space-y-4">
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter bg-gradient-to-r from-white to-zinc-500 bg-clip-text text-transparent">
                    Bored? Dive into the Unknown.
                </h1>
                <p class="text-zinc-400 text-lg md:text-xl max-w-2xl mx-auto">
                    One click to discover your next favorite website. No algorithms, just pure exploration.
                </p>
            </div>

            <div class="py-12">
                <button id="discoverBtn" class="group relative px-12 py-6 bg-white text-black font-black text-2xl rounded-2xl transition-all hover:scale-105 active:scale-95 shadow-[0_0_50px_-12px_rgba(255,255,255,0.4)]">
                    STUMBLE!
                    <div class="absolute inset-0 rounded-2xl bg-white/20 blur-xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                </button>
            </div>

            <!-- Website Preview (Skeleton/Placeholder) -->
            <div id="previewCard" class="hidden w-full max-w-2xl mx-auto p-6 rounded-3xl bg-zinc-900 border border-zinc-800 shadow-2xl transform transition-all duration-500 opacity-0 translate-y-4">
                <div class="h-48 bg-zinc-800 rounded-2xl mb-6 animate-pulse"></div>
                <div class="space-y-3 text-left">
                    <div class="h-6 w-3/4 bg-zinc-800 rounded animate-pulse"></div>
                    <div class="h-4 w-1/2 bg-zinc-800 rounded animate-pulse"></div>
                    <div class="flex gap-2 pt-2">
                        <div class="h-6 w-16 bg-zinc-800 rounded-full animate-pulse"></div>
                        <div class="h-6 w-20 bg-zinc-800 rounded-full animate-pulse"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-800 py-8 bg-zinc-950">
        <div class="max-w-7xl mx-auto px-4 text-center text-zinc-500 text-sm">
            &copy; 2026 TryMeTumble. Redefining web exploration.
        </div>
    </footer>

    <script>
        const discoverBtn = document.getElementById('discoverBtn');
        const previewCard = document.getElementById('previewCard');

        discoverBtn.addEventListener('click', async () => {
            // Show skeleton loader
            previewCard.classList.remove('hidden');
            setTimeout(() => {
                previewCard.classList.remove('opacity-0', 'translate-y-4');
            }, 50);

            try {
                const response = await fetch('/api/Websites/discover');
                if (!response.ok) throw new Error('Failed to fetch a random website');
                
                const data = await response.json();
                
                if (data && data.url) {
                    window.open(data.url, '_blank');
                    console.log("Stumbling to:", data.url);
                } else {
                    console.warn("No website found in the response.");
                    alert("No websites found! Check back later.");
                }
            } catch (err) {
                console.error("Discovery failed", err);
                alert("Something went wrong while trying to stumble. Please try again.");
            }
        });
    </script>
</body>
</html>
