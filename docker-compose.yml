services:
  db:
    image: postgres:15-alpine
    container_name: try-me-tumble-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-try-me-tumble}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-try-me-tumble}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: try-me-tumble-cache
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
    container_name: try-me-tumble-api
    ports:
      - "${API_PORT:-5200}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB:-try-me-tumble};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-password}
      - ConnectionStrings__Redis=redis:6379
      - AppSettings__Token=${JWT_TOKEN:-ThisIsALongAndSecureKeyForJWTTokenGenerationAtLeast64CharsLong!!}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:

